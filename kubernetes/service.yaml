apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
spec:
  selector: 
    app: mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: Secure-File-Scan-service
spec:
  selector: 
    app: Secure-File-Scan
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
      nodePort: 30000  # Choose a port in the range 30000-32767
  type: NodePort
